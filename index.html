// 1. ฟังก์ชัน KuromiAlert (ดัดแปลงมาจาก SystemAlert ของคุณ)
async function KuromiAlert(msg) {
    return new Promise(resolve => {
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 bg-slate-900/40 flex items-center justify-center z-[100] p-4 backdrop-blur-sm";
        modal.innerHTML = `
            <div class="bg-white rounded-xl p-8 w-full max-w-sm shadow-2xl border border-slate-200 relative overflow-hidden text-center">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mx-auto mb-5 text-2xl">
                    <i class="fas fa-info-circle"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-2">แจ้งเตือน</h3>
                <p class="text-sm font-normal text-slate-600 mb-6 whitespace-pre-line leading-relaxed">${msg}</p>
                <button id="kuromi-alert-ok" class="w-full px-4 py-3 rounded-lg font-semibold text-white bg-blue-600 hover:bg-blue-700 transition-all">ตกลง</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('kuromi-alert-ok').onclick = () => { document.body.removeChild(modal); resolve(); };
    });
}

// 2. ฟังก์ชัน KuromiConfirm (สร้างขึ้นใหม่เพื่อให้มีปุ่ม ยืนยัน/ยกเลิก)
async function KuromiConfirm(msg) {
    return new Promise(resolve => {
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 bg-slate-900/40 flex items-center justify-center z-[100] p-4 backdrop-blur-sm";
        modal.innerHTML = `
            <div class="bg-white rounded-xl p-8 w-full max-w-sm shadow-2xl border border-slate-200 relative overflow-hidden text-center">
                <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center mx-auto mb-5 text-2xl">
                    <i class="fas fa-question-circle"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-2">ยืนยันการดำเนินการ</h3>
                <p class="text-sm font-normal text-slate-600 mb-6 whitespace-pre-line leading-relaxed">${msg}</p>
                <div class="flex gap-3">
                    <button id="kuromi-confirm-no" class="flex-1 px-4 py-3 rounded-lg font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-all">ยกเลิก</button>
                    <button id="kuromi-confirm-yes" class="flex-1 px-4 py-3 rounded-lg font-semibold text-white bg-blue-600 hover:bg-blue-700 transition-all">ยืนยัน</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('kuromi-confirm-yes').onclick = () => { document.body.removeChild(modal); resolve(true); };
        document.getElementById('kuromi-confirm-no').onclick = () => { document.body.removeChild(modal); resolve(false); };
    });
}

function SystemConfirm(msg) {
    return new Promise(resolve => {
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 bg-slate-900/40 flex items-center justify-center z-[100] p-4 backdrop-blur-sm";
        modal.innerHTML = `
            <div class="bg-white rounded-xl p-8 w-full max-w-sm shadow-2xl border border-slate-200 relative overflow-hidden text-center">
                <div class="w-14 h-14 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center mx-auto mb-5 text-2xl">

                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('sys-conf-cancel').onclick = () => { document.body.removeChild(modal); resolve(false); };
        document.getElementById('sys-conf-ok').onclick = () => { document.body.removeChild(modal); resolve(true); };
    });
}

// ฟังก์ชันสำหรับแปลงรูปแบบวันที่เป็น DD/MM/YYYY
function formatDateDDMMYYYY(timestamp) {
    if (!timestamp) return '-';
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    if (isNaN(date.getTime())) return '-';
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear(); // ปี ค.ศ.
    return `${day}/${month}/${year}`;
}

function formatDateToDDMMYYYY(dateStr) {
    if (!dateStr) return '-';
    const parts = dateStr.split('-');
    if (parts.length === 3) {
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }
    return dateStr;
}

// แก้ไข: รวมฟังก์ชัน showTab ให้เหลือจุดเดียวเพื่อจัดการเมนูและเนื้อหา
function showTab(tabName) {
    currentTab = tabName; // เปลี่ยนค่าตัวแปรหน้าปัจจุบัน
    setupNav();           // วาดเมนูใหม่เพื่อให้สี Active เปลี่ยนไปตามหน้า
    renderTab();          // แสดงเนื้อหาของหน้านั้นๆ
}

function loadInitialTab() {
    showTab(currentUser.role === 'approver' ? 'approve' : 'request');
}

function startListeners() {
    if (!auth.currentUser) return;

    unsubStock = getStockCollection().onSnapshot(snap => {
        stockData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        if (currentTab === 'stock' || currentTab === 'request') renderTab();
        // ลบ updateCloudUsage(); ออกไปครับ
    }, err => console.error("Stock Sync Error:", err));

    unsubRequests = getRequestsCollection().onSnapshot(snap => {
        requestsData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
            .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        // เพิ่ม 'sale_trans' ตรงนี้
        if (currentTab === 'status' || currentTab === 'approve' || currentTab === 'summary' || currentTab === 'sale_trans') renderTab();
    }, err => console.error("Requests Sync Error:", err));

    unsubAddLogs = getAddLogsCollection().onSnapshot(snap => {
        addLogsData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
            .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        if (currentTab === 'summary' || currentTab === 'purchase_trans') renderTab();
    }, err => console.error("AddLogs Sync Error:", err));
}

// ฟังก์ชันคำนวณจำนวนที่ถูกจอง (สถานะ pending)
function getReservedQuantity(productName) {
    return requestsData
        .filter(r => r.status === 'pending' && r.productName === productName)
        .reduce((sum, r) => sum + (parseInt(r.quantity) || 0), 0);
}

// --- RENDER LOGIC ---
function renderTab() {
    const container = document.getElementById('content-area');
    if (!container) return;
    
    if (currentTab === 'request') {
    container.innerHTML = `
        <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 max-w-2xl mx-auto">
            <h3 class="text-xl font-bold mb-8 text-slate-800 flex items-center gap-3">
                <i class="fas fa-file-invoice text-blue-600"></i> กรอกข้อมูลเบิกสินค้า
            </h3>
            
            <form onsubmit="handleRequestSubmit(event)" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">วันที่</label>
                        <input type="date" id="req-date" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-slate-700" value="${new Date().toISOString().split('T')[0]}" required>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">เลือกสินค้า</label>
                        <select id="req-product" onchange="autoFillCost(this.value)" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-slate-700" required>
                            <option value="">-- เลือกสินค้า --</option>
                            ${(() => {
                                const order = ["Size M", "Size L", "Size XL", "Size 2XL", "Size 3XL", "Size 4XL", "Size 5XL", "สายคล้องบัตร", "กระเป๋าเก็บความเย็นใหญ่", "กระเป๋าเก็บความเย็นเล็ก"];
                                return [...stockData]
                                    .map(s => {
                                        const reserved = getReservedQuantity(s.productName);
                                        const available = s.currentStock - reserved;
                                        return { ...s, available };
                                    })
                                    .filter(s => s.available > 0)
                                    .sort((a, b) => {
                                        const nameA = (a.productName || "").trim();
                                        const nameB = (b.productName || "").trim();
                                        let indexA = order.indexOf(nameA);
                                        let indexB = order.indexOf(nameB);
                                        if (indexA === -1) indexA = 999;
                                        if (indexB === -1) indexB = 999;
                                        return indexA !== indexB ? indexA - indexB : nameA.localeCompare(nameB, 'th');
                                    })
                                    .map(s => `
                                        <option value="${s.productName}">
                                            ${s.productName} (คงเหลือ: ${s.available}, ราคา: ${s.price || 0} บาท)
                                        </option>
                                    `).join('');
                            })()}
                        </select>

    const calculateTotals = (start, end) => {
        const reqs = requestsData.filter(r => r.status === 'approved' && r.date >= start && r.date <= end);
        const purchases = (typeof addLogsData !== 'undefined' ? addLogsData : []).filter(p => p.date >= start && p.date <= end);
        
        const sales = reqs.reduce((acc, r) => acc + (Number(r.productPrice) * Number(r.quantity)), 0);
        const purchase = purchases.reduce((acc, log) => acc + ((log.unitPrice !== undefined ? log.unitPrice : (PURCHASE_COSTS[log.productName] || 0)) * Number(log.quantity)), 0);
        
        return { sales, purchase, profit: sales - purchase };

    // คำนวณข้อมูลย้อนหลัง 6 เดือนสำหรับกราฟเส้น (อิงจากเดือนของวันที่เลือกเริ่มต้น)

    const trendData = [];
    const baseDate = new Date(window.endDate);
    const selY = baseDate.getFullYear();
    const selM = baseDate.getMonth() + 1;
    
    for (let i = 5; i >= 0; i--) {
        const d = new Date(selY, selM - 1 - i, 1);
        const startStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`;
        const endStr = new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().split('T')[0];
        const data = calculateTotals(startStr, endStr);
        
        const monthNames = ["", "ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
        trendLabels.push(monthNames[d.getMonth() + 1]);
        trendData.push(data.profit);
    }

    // กรองข้อมูลช่วงวันที่ปัจจุบัน
    const filteredRequests = requestsData.filter(r => r.status === 'approved' && r.date >= window.startDate && r.date <= window.endDate);
    const allPurchaseList = (typeof addLogsData !== 'undefined' ? addLogsData : []);
    const filteredPurchases = allPurchaseList.filter(p => p.date >= window.startDate && p.date <= window.endDate);

    // คำนวณช่วงเวลาก่อนหน้าเพื่อเปรียบเทียบ (เปรียบเทียบจากจำนวนวันแบบ Day-to-Day)
    const dStart = new Date(window.startDate);
    const dEnd = new Date(window.endDate);
    const diffTime = dEnd.getTime() - dStart.getTime();

function getLast7DaysStat(type) {
    const dates = [];
    for(let i=0; i<7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(d.toISOString().split('T')[0]);
    }
    const data = type === 'withdraw' ? requestsData.filter(r => r.status === 'approved') : addLogsData;
    return dates.map(date => {
        const recordsForDate = data.filter(r => r.date === date);
        const dailySum = recordsForDate.reduce((sum, item) => sum + item.quantity, 0);
        const detailsMap = {};
        recordsForDate.forEach(r => { detailsMap[r.productName] = (detailsMap[r.productName] || 0) + r.quantity; });
        const detailStr = Object.entries(detailsMap).map(([name, qty]) => `${name} (x${qty})`).join(', ');
        return `
            <div class="py-2 border-b border-slate-50 last:border-0">
                <div class="flex items-center justify-between text-sm mb-1">
                    <span class="font-bold text-slate-400">${date === new Date().toISOString().split('T')[0] ? 'วันนี้' : date}</span>
                    <div class="flex-1 mx-4 bg-slate-50 h-2 rounded-full overflow-hidden">
                        <div class="${type === 'withdraw' ? 'bg-pink-400' : 'bg-slate-400'} h-full" style="width: ${Math.min(dailySum, 100)}%"></div>
                    </div>
                    <span class="font-black text-slate-700 w-10 text-right">${dailySum}</span>
                </div>
                ${detailStr ? `<p class="text-[10px] text-slate-400 font-medium pl-1 flex items-start gap-1"><i class="fas fa-tag opacity-40 mt-0.5"></i> <span>${detailStr}</span></p>` : ''}
            </div>
        `;
    }).join('');
}

async function handleAddNewProduct(e) {
    e.preventDefault();
    if (!auth.currentUser || currentUser.role !== 'approver') return;

    const nameInput = document.getElementById('new-prod-name');
    const stockInput = document.getElementById('new-prod-stock');
    const minInput = document.getElementById('new-prod-min');
    const priceInput = document.getElementById('new-prod-price');
    const customInput = document.getElementById('new-prod-custom');
    const purchasePriceInput = document.getElementById('new-prod-purchase-price');
    
    // 1. ตรวจสอบเงื่อนไขชื่อสินค้า
    let name = nameInput.value;
    const isOther = (name === 'อื่นๆ');
    const isSecondHand = name.includes('มือสอง');
    if (isOther) {
        name = customInput ? customInput.value : 'สินค้าไม่ระบุชื่อ';
    }

    // --- แก้ไขตรงนี้: ใส่ || 0 เพื่อกันค่า NaN ---
    const stockToAdd = parseInt(stockInput.value) || 0;
    const price = parseFloat(priceInput.value) || 0;
    let min = parseInt(minInput.value) || 0;

    // คำนวณต้นทุน:
    let purchasePrice = 0;
    if (isOther || isSecondHand) {
        // ถ้าเป็น "มือสอง" หรือ "อื่นๆ" ให้ใช้ค่าที่ผู้ใช้กรอกในช่อง Input
        purchasePrice = parseFloat(purchasePriceInput.value) || 0;
    } else {
        // ถ้าเป็นสินค้าทั่วไป ให้ดึงค่าจากตัวแปร PURCHASE_COSTS
        // โดยใช้ nameInput.value (ชื่อใน Dropdown) เป็นตัวค้นหา
        purchasePrice = PURCHASE_COSTS[nameInput.value] || 0;
    }
    // ----------------------------------------

    const addedBy = currentUser.name || 'Admin';

    if (!(await KuromiConfirm(`ยืนยันการเพิ่มสินค้า?\n\nรายการ: ${name}\nจำนวน: ${stockToAdd}\nราคาขาย: ${price}\nต้นทุน: ${purchasePrice}\nจุดสั่งซื้อ: ${min}\nผู้เพิ่ม: ${addedBy}`))) return;

    try {
        const existingProduct = stockData.find(s => s.productName === name);

        if (existingProduct) {
            await getStockCollection().doc(existingProduct.id).update({
                currentStock: firebase.firestore.FieldValue.increment(stockToAdd),
                price: price,
		purchasePrice: purchasePrice,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        } else {
            await getStockCollection().add({
                productName: name,
                currentStock: stockToAdd,
                minStock: min,
                price: price,
                purchasePrice: purchasePrice, 
                withdrawalCount: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        
        await getAddLogsCollection().add({
            date: new Date().toISOString().split('T')[0],
            productName: name,
            quantity: stockToAdd,
            addedBy: addedBy,
            unitPrice: purchasePrice, // ค่านี้จะไม่เป็น NaN แน่นอน
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        e.target.reset();
        // ... (ส่วนที่เหลือของโค้ดคงเดิม)
        
        await KuromiAlert('ดำเนินการเรียบร้อยแล้ว');
    } catch (err) { 
        console.error("Error Detail:", err); // เพิ่มบรรทัดนี้เพื่อดู Error ใน Console ชัดขึ้น
        await KuromiAlert('เกิดข้อผิดพลาด: ' + err.message); 
    }
}

// 1. กำหนด URL ของ Web App ไว้ที่ด้านบนสุดของไฟล์ หรือในที่ที่เข้าถึงได้
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxRn4cKmm1aDKqrWJ9D8gltEMPOPcXrdZL77UZN_akUDyb7WbQ8hPQ2GvLNYfa4MnPe-w/exec'; 

async function handleRequestSubmit(e) {
    e.preventDefault();
    
    // 1. ประกาศตัวแปร
    const productName = document.getElementById('req-product').value;
    const storeId = document.getElementById('req-store').value.trim();
    const branchName = document.getElementById('req-branch').value.trim();
    const quantity = parseInt(document.getElementById('req-qty').value);
    const requesterName = document.getElementById('req-name').value; 
    const date = document.getElementById('req-date').value;
    const deductInput = document.getElementById('withdraw-deduct-income');
    const deductIncome = deductInput ? (parseFloat(deductInput.value) || 0) : 0;
    
    // 2. ตรวจสอบเงื่อนไข
    if (productName.includes('กระเป๋า')) {
        if (!storeId || !branchName) {
            await KuromiAlert('กรุณากรอกรหัสร้านและชื่อสาขาสำหรับรายการกระเป๋า');
            return;
        }
    }

    const product = stockData.find(s => s.productName === productName);

    if (!product || product.currentStock < quantity) {
        return await KuromiAlert(`สินค้าไม่เพียงพอ! เหลือเพียง ${product ? product.currentStock : 0} ชิ้น`);
    }

    if (!(await KuromiConfirm(`ยืนยันการแจ้งเบิก?\n\nรายการ: ${productName}\nจำนวน: ${quantity}`))) return;

    try {
        // 3. บันทึกลง Firebase
        await getRequestsCollection().add({
            date, 
            productName, 
            productPrice: product ? (product.price || 0) : 0,
            quantity, 
            requesterName, 
            deductIncome: deductIncome,
            riderName: document.getElementById('req-rider').value,
            storeId: storeId,
            branchName: branchName,
            status: 'pending',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        // --- ส่วนที่เพิ่ม: ส่ง LINE ทันทีที่บันทึกสำเร็จ ---
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // สำคัญมาก เพื่อป้องกันปัญหา CORS
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    productName: productName,
                    quantity: quantity,
                    requesterName: requesterName,
                    riderName: document.getElementById('req-rider').value,
                    storeId: storeId,
                    branchName: branchName,
                    deductIncome: deductIncome
                })
            });
            console.log("ส่งแจ้งเตือน LINE แล้ว");
        } catch (lineErr) {
            // ใส่ try-catch ครอบเพื่อไม่ให้ระบบหลักพังถ้า LINE ส่งไม่สำเร็จ
            console.error("ส่ง LINE ไม่สำเร็จ:", lineErr);
        }
        // ------------------------------------------

        await KuromiAlert('ส่งคำขอเบิกแล้ว');

        // ล้างค่าฟอร์ม
        document.getElementById('req-qty').value = '1';
        document.getElementById('req-store').value = '';
        document.getElementById('req-branch').value = '';
        if (deductInput) deductInput.value = '';

        showTab('status');
    } catch (err) { 
        await KuromiAlert('ไม่สำเร็จ: ' + err.message); 
    }
}

async function updateRequestField(reqId, field, value) {
    const reqRef = getRequestsCollection().doc(reqId);
    const snap = await reqRef.get();
    const oldData = snap.data();
    const newValue = field === 'quantity' ? parseInt(value) : value;
    const stockItem = stockData.find(s => s.productName === oldData.productName);

    if (field === 'quantity' && oldData.status === 'approved' && stockItem.currentStock < (newValue - oldData.quantity)) {
        await KuromiAlert('สต็อกไม่พอแก้เลข');
        renderTab();
        return;
    }
    if (!(await KuromiConfirm(`ยืนยันการแก้ไขข้อมูล?`))) { renderTab(); return; }

    try {
        if (stockItem && field === 'quantity' && oldData.status === 'approved') {
            const diff = newValue - oldData.quantity;
            await getStockCollection().doc(stockItem.id).update({ 
                currentStock: firebase.firestore.FieldValue.increment(-diff), 
                withdrawalCount: firebase.firestore.FieldValue.increment(diff) 
            });
        }
        await reqRef.update({ [field]: newValue, updatedBy: currentUser.name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        await KuromiAlert('บันทึกแล้ว');
    } catch (err) { 
        await KuromiAlert('เกิดปัญหา: ' + err.message); 
        renderTab();
    }
}

function toggleCustomProductInput() {
    const select = document.getElementById('new-prod-name');
    if (!select) return; // ป้องกัน error ถ้าหา select ไม่เจอ
    
    const value = select.value;

    // แก้ไข ID ให้ตรงกับ HTML จริงๆ
    const customInput = document.getElementById('new-prod-custom'); // เปลี่ยนจาก custom-name-container เป็น ID นี้
    const costContainer = document.getElementById('purchase-price-container');

    // 1. จัดการช่อง "ระบุชื่อสินค้า" (แสดงเฉพาะเมื่อเลือก "อื่นๆ")
    if (customInput) {
        if (value === 'อื่นๆ') {
            customInput.classList.remove('hidden');
            customInput.setAttribute('required', 'true'); // เพิ่ม required เมื่อแสดง
        } else {
            customInput.classList.add('hidden');
            customInput.removeAttribute('required'); // เอา required ออกเมื่อซ่อน
        }
    }

    // 2. จัดการช่อง "ราคาซื้อ (ต้นทุน)" (แสดงเมื่อเลือก "มือสอง" หรือ "อื่นๆ")
    if (costContainer) {
        if (value.includes('มือสอง') || value === 'อื่นๆ') {
            costContainer.classList.remove('hidden');
        } else {
            costContainer.classList.add('hidden');
        }
    }
}

function filterStatusTable() {
    const branch = document.getElementById('filter-branch').value.toLowerCase();
    const req = document.getElementById('filter-req').value.toLowerCase();
    const rider = document.getElementById('filter-rider').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    document.querySelectorAll('.status-row').forEach(row => {
        const match = row.dataset.branch.includes(branch) && row.dataset.req.includes(req) && row.dataset.rider.includes(rider) && (status === "" || row.dataset.status === status);
        row.style.display = match ? '' : 'none';
    });
}

function getStatusClass(status) { return status === 'approved' ? 'bg-blue-600 text-white border-none' : status === 'rejected' ? 'bg-slate-800 text-white border-none' : 'bg-white text-slate-600 border-2 border-slate-200'; }
function getStatusLabel(status) { return status === 'approved' ? 'อนุมัติแล้ว' : status === 'rejected' ? 'ปฏิเสธ' : 'รออนุมัติ'; }

// ฟังก์ชันสำหรับการค้นหาในตาราง
function filterSaleTable() {
    const keyword = document.getElementById('search-sale').value.toLowerCase();
    document.querySelectorAll('.sale-row').forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(keyword) ? '' : 'none';
    });
}

function filterPurchaseTable() {
    const keyword = document.getElementById('search-purchase').value.toLowerCase();
    document.querySelectorAll('.purchase-row').forEach(row => {
        const text = row.dataset.name.toLowerCase();
        row.style.display = text.includes(keyword) ? '' : 'none';
    });
}

// ฟังก์ชันบันทึก Transaction ขาย (Inline Edit)
async function saveEditSale(reqId) {
    const deliveryFee = parseFloat(document.getElementById(`edit-sale-delivery-${reqId}`).value) || 0;
    const bgCheckFee = parseFloat(document.getElementById(`edit-sale-bg-${reqId}`).value) || 0;
    const riderName = document.getElementById(`edit-sale-rider-${reqId}`).value;
    
    try {
        await getRequestsCollection().doc(reqId).update({
            deliveryFee: deliveryFee,
            bgCheckFee: bgCheckFee,
            riderName: riderName,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        editingRequestId = null;
        renderTab();
        await KuromiAlert("บันทึกข้อมูลเรียบร้อยแล้ว");
    } catch (err) {
        await KuromiAlert("เกิดข้อผิดพลาด: " + err.message);
    }
}

// ฟังก์ชันบันทึก Transaction ซื้อ (Inline Edit)
async function saveEditPurchase(logId) {
    const quantity = parseInt(document.getElementById(`edit-purchase-qty-${logId}`).value) || 0;
    
    try {
        await getAddLogsCollection().doc(logId).update({
            quantity: quantity,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        editingPurchaseId = null;
        renderTab();
        await KuromiAlert("บันทึกข้อมูลเรียบร้อยแล้ว");
    } catch (err) {
        await KuromiAlert("เกิดข้อผิดพลาด: " + err.message);
    }
}

// ฟังก์ชันลบ Transaction ซื้อ
async function deletePurchaseRecord(logId) {
    if (await KuromiConfirm("คุณแน่ใจหรือไม่ว่าต้องการลบประวัติการซื้อนี้?")) {
        try {
            await getAddLogsCollection().doc(logId).delete();
            await KuromiAlert("ลบข้อมูลเรียบร้อยแล้ว");
        } catch (err) {
            await KuromiAlert("เกิดข้อผิดพลาด: " + err.message);
        }
    }
}

// ======= เพิ่มฟังก์ชันนี้เข้าไปครับ =======
async function approveRequest(reqId, newStatus) {
    if (currentUser.role !== 'approver') return;
    
    const label = newStatus === 'approved' ? 'อนุมัติ' : 'ปฏิเสธ';
    if (!(await KuromiConfirm(`คุณแน่ใจหรือไม่ว่าต้องการ ${label} รายการนี้?`))) {
        renderTab();
        return;
    }

    try {
        const reqRef = getRequestsCollection().doc(reqId);
        const snap = await reqRef.get();
        const reqData = snap.data();

        if (!reqData) return;

        // คำนวณยอดสุทธิ
        const pricePerUnit = reqData.productPrice || 0;
        const totalAmount = pricePerUnit * reqData.quantity;
        const deductAmount = reqData.deductIncome || 0;
        const netTotal = totalAmount - deductAmount;

        // ตรวจสอบสต็อก
        if (reqData.status === 'approved' && newStatus !== 'approved') {
            const product = stockData.find(s => s.productName === reqData.productName);
            if (product) {
                await getStockCollection().doc(product.id).update({
                    currentStock: firebase.firestore.FieldValue.increment(reqData.quantity),
                    withdrawalCount: firebase.firestore.FieldValue.increment(-reqData.quantity)
                });
            }
        } 
        else if (newStatus === 'approved' && reqData.status !== 'approved') {
            const product = stockData.find(s => s.productName === reqData.productName);
            if (!product || product.currentStock < reqData.quantity) {
                await KuromiAlert(`ไม่สามารถอนุมัติได้เนื่องจากสินค้าคงเหลือในระบบมีไม่เพียงพอ`);
                renderTab();
                return;
            }
            await getStockCollection().doc(product.id).update({
                currentStock: firebase.firestore.FieldValue.increment(-reqData.quantity),
                withdrawalCount: firebase.firestore.FieldValue.increment(reqData.quantity)
            });
        }

        // อัปเดตสถานะและบันทึกยอดสุทธิ
        await reqRef.update({
            status: newStatus,
            approvedBy: currentUser.name,
            approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
            netTotal: netTotal
        });

        await KuromiAlert(`ดำเนินการ ${label} เรียบร้อยแล้ว`);
    } catch (err) {
        await KuromiAlert("เกิดข้อผิดพลาด: " + err.message);
        renderTab();
    }
}

async function deleteRequestRecord(docId) { if (await KuromiConfirm("ลบประวัตินี้?")) await getRequestsCollection().doc(docId).delete(); }

async function updateTransactionFee(reqId, field, value) {
    if (currentUser.role !== 'approver') return;
    
    const numValue = parseFloat(value) || 0;
    try {
        await getRequestsCollection().doc(reqId).update({
            [field]: numValue,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        // ไม่ต้อง Alert เพื่อให้กรอกตัวเลขต่อเนื่องได้เลย เพราะ Listener จะจับและอัปเดตเอง
    } catch (err) {
        await KuromiAlert("เกิดข้อผิดพลาดในการบันทึก: " + err.message);
        renderTab(); // รีเฟรชกลับไปค่าเดิมถ้าบันทึกไม่สำเร็จ
    }
}
