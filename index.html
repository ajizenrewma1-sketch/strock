<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสต็อกสินค้า</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <!-- Login Section -->
    <div id="login-section" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-boxes text-blue-600 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Inventory System</h1>
                <p class="text-slate-500">กรุณาเข้าสู่ระบบด้วยสิทธิ์ Approver เพื่อลบสินค้า</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required placeholder="requester หรือ approver">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required placeholder="123 หรือ 456">
                </div>
                <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition transform active:scale-95">เข้าสู่ระบบ</button>
            </form>
            <div class="mt-6 p-3 bg-slate-50 rounded-lg text-[11px] text-slate-400 text-center">
                User: <b>requester</b> (123) | <b>approver</b> (456)
            </div>
        </div>
    </div>

    <!-- App Section -->
    <div id="app-section" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col">
            <div class="p-6 border-b">
                <div class="flex items-center gap-3 text-blue-600 font-bold text-xl mb-4">
                    <i class="fas fa-box-open"></i> StockApp
                </div>
                <div id="user-info" class="text-xs bg-slate-100 p-2 rounded text-slate-600 font-medium truncate italic"></div>
            </div>
            <nav class="flex-1 p-4 space-y-2" id="nav-menu"></nav>
            <div class="p-4 border-t">
                <button onclick="handleLogout()" class="w-full text-left flex items-center gap-3 px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </button>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-8 overflow-y-auto">
            <div id="content-area"></div>
        </main>
    </div>

    <script>
// --- CONFIGURATION ---
const appId = 'inventory-html-001'; 

const firebaseConfig = {
  apiKey: "AIzaSyC_j4rtlWnUn8Tl7WUSoozLJvsqh-RKCeQ",
  authDomain: "mystocksystem-96108.firebaseapp.com",
  projectId: "mystocksystem-96108",
  storageBucket: "mystocksystem-96108.firebasestorage.app",
  messagingSenderId: "346699990806",
  appId: "1:346699990806:web:4f43cb52dfdfaa13c57237",
  measurementId: "G-KCNWYY7SYH"
};
        
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const getStockCollection = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('stock');
const getRequestsCollection = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('requests');

const MOCK_USERS = [
    { username: 'requester', password: '123', role: 'requester', name: 'พนักงานเบิกสินค้า' },
    { username: 'approver', password: '456', role: 'approver', name: 'หัวหน้า/ผู้อนุมัติ' }
];

let currentUser = null;
let stockData = [];
let requestsData = [];
let currentTab = '';
let unsubStock = null;
let unsubRequests = null;

// --- AUTH LOGIC ---
const loginForm = document.getElementById('login-form');
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const loginBtn = document.getElementById('login-btn');
    loginBtn.disabled = true;
    loginBtn.innerText = 'กำลังตรวจสอบสิทธิ์...';

    const userMatch = MOCK_USERS.find(u => u.username === document.getElementById('username').value && u.password === document.getElementById('password').value);
    
    if (userMatch) {
        try {
            await auth.signInAnonymously();
            currentUser = userMatch;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-info').innerText = `สิทธิ์ใช้งาน: ${currentUser.name}`;
            
            setupNav();
            loadInitialTab();
            startListeners();
        } catch (error) {
            console.error("Auth Error:", error);
            alert('ไม่สามารถเชื่อมต่อฐานข้อมูลได้: ' + error.message);
        }
    } else {
        alert('Username หรือ Password ไม่ถูกต้อง');
    }
    loginBtn.disabled = false;
    loginBtn.innerText = 'เข้าสู่ระบบ';
});

function handleLogout() {
    if (unsubStock) unsubStock();
    if (unsubRequests) unsubRequests();
    auth.signOut();
    location.reload();
}

function setupNav() {
    const nav = document.getElementById('nav-menu');
    let menu = `
        <button onclick="showTab('request')" class="nav-btn w-full text-left flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fas fa-plus-circle"></i> แจ้งเบิกสินค้า
        </button>
        <button onclick="showTab('status')" class="nav-btn w-full text-left flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-50 hover:text-blue-600 transition">
            <i class="fas fa-list-ul"></i> รายงานสถานะ
        </button>
    `;

    if (currentUser.role === 'approver') {
        menu += `
            <div class="pt-4 pb-2 px-4 text-[10px] uppercase font-bold text-slate-400">การจัดการหลัก</div>
            <button onclick="showTab('approve')" class="nav-btn w-full text-left flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-50 hover:text-blue-600 transition">
                <i class="fas fa-check-double"></i> อนุมัติเบิกสินค้า
            </button>
            <button onclick="showTab('stock')" class="nav-btn w-full text-left flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-50 hover:text-blue-600 transition">
                <i class="fas fa-warehouse"></i> สินค้าคงเหลือ
            </button>
        `;
    }
    nav.innerHTML = menu;
}

function loadInitialTab() {
    showTab(currentUser.role === 'approver' ? 'approve' : 'request');
}

function startListeners() {
    if (!auth.currentUser) return;

    unsubStock = getStockCollection().onSnapshot(snap => {
        stockData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        if (currentTab === 'stock' || currentTab === 'request') renderTab();
        updateCloudUsage(); 
    }, err => console.error("Stock Sync Error:", err));

    unsubRequests = getRequestsCollection().onSnapshot(snap => {
        requestsData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
            .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        if (currentTab === 'status' || currentTab === 'approve') renderTab();
        updateCloudUsage(); 
    }, err => console.error("Requests Sync Error:", err));
}

function showTab(tab) {
    currentTab = tab;
    renderTab();
}

// --- ส่วนที่ต้องใช้ Render หน้าตาตาราง ---
function getStatusClass(status) {
    if (status === 'approved') return 'bg-green-100 text-green-700';
    if (status === 'rejected') return 'bg-red-100 text-red-700';
    return 'bg-amber-100 text-amber-700';
}

function getStatusLabel(status) {
    if (status === 'approved') return 'อนุมัติแล้ว';
    if (status === 'rejected') return 'ปฏิเสธ';
    return 'รออนุมัติ';
}

function renderTab() {
    const container = document.getElementById('content-area');
    if (!container) return;
    
    if (currentTab === 'request') {
        container.innerHTML = `
            <div class="bg-white p-6 rounded-xl shadow-sm border max-w-2xl">
                <h3 class="text-lg font-bold mb-6">กรอกข้อมูลเบิกสินค้า</h3>
                <form onsubmit="handleRequestSubmit(event)" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">เลือกสินค้า</label>
                            <select id="req-product" class="w-full px-4 py-2 border rounded-lg outline-none" required>
                                <option value="">-- เลือกสินค้า --</option>
                                ${stockData.map(s => `<option value="${s.productName}">${s.productName} (คงเหลือ: ${s.currentStock})</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">จำนวน</label>
                            <input type="number" id="req-qty" min="1" class="w-full px-4 py-2 border rounded-lg" required>
                        </div>
                    </div>
                    <button type="submit" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-lg font-bold">ยืนยันการเบิก</button>
                </form>
            </div>
        `;
    } else if (currentTab === 'status') {
        container.innerHTML = `
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4">สินค้า</th>
                            <th class="px-6 py-4">จำนวน</th>
                            <th class="px-6 py-4">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        ${requestsData.map(r => `
                            <tr>
                                <td class="px-6 py-4 text-sm font-bold">${r.productName}</td>
                                <td class="px-6 py-4 text-sm">${r.quantity}</td>
                                <td class="px-6 py-4 text-sm font-bold ${getStatusClass(r.status)}">${getStatusLabel(r.status)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }
}

async function handleRequestSubmit(e) {
    e.preventDefault();
    const productName = document.getElementById('req-product').value;
    const quantity = parseInt(document.getElementById('req-qty').value);
    try {
        await getRequestsCollection().add({
            productName, quantity, status: 'pending',
            requesterName: currentUser.name,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('ส่งคำขอสำเร็จ');
        showTab('status');
    } catch (err) { alert(err.message); }
}
function updateCloudUsage() {
    const totalLines = requestsData.length + stockData.length;
    const limit = 1000000; 
    let usagePercent = (totalLines / limit) * 100;
    if (usagePercent > 100) usagePercent = 100;
    const remainingPercent = 100 - usagePercent;
    
    const isCritical = usagePercent > 80;
    const barColor = isCritical ? 'bg-rose-500' : 'bg-blue-400';
    const textColor = isCritical ? 'text-rose-400' : 'text-blue-400';

    const usageHTML = `
        <div class="mt-4 p-4 bg-slate-900 rounded-2xl shadow-xl border border-slate-700 relative">
            <div class="flex justify-between items-center mb-3">
                <span class="text-white font-bold text-xs flex items-center gap-2">
                    <i class="fas fa-database text-blue-400"></i> FIRESTORE (1GB Limit)
                </span>
                <span class="${textColor} font-black text-[10px]">${usagePercent.toFixed(4)}%</span>
            </div>
            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-[2px] border border-slate-700">
                <div class="${barColor} h-full rounded-full transition-all duration-1000" style="width: ${usagePercent}%"></div>
            </div>
            <div class="mt-3 flex justify-between items-end">
                <div>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">Remaining Space</p>
                    <p class="text-white font-black text-sm">${remainingPercent.toFixed(2)}% <span class="text-[10px] text-slate-400 font-normal">Available</span></p>
                </div>
            </div>
        </div>
    `;
    
    const nav = document.getElementById('nav-menu');
    let usageBox = document.getElementById('cloud-usage-box');
    if (!usageBox) {
        usageBox = document.createElement('div');
        usageBox.id = 'cloud-usage-box';
        usageBox.className = "px-2 pb-4 mt-auto";
        nav.appendChild(usageBox);
    }
    usageBox.innerHTML = usageHTML;
}

async function deleteRequestRecord(docId) {
    if (!auth.currentUser || currentUser.role !== 'approver') return;
    if (!confirm('ยืนยันการลบรายการประวัตินี้?')) return;
    try {
        await getRequestsCollection().doc(docId).delete();
    } catch (err) {
        alert('ไม่สามารถลบข้อมูลได้: ' + err.message);
    }
}

    // 2. ยืนยันการลบ
    if (!confirm('ยืนยันการลบรายการประวัตินี้? (การลบประวัติจะไม่คืนค่าสต็อกสินค้าโดยอัตโนมัติ)')) return;

    try {
        // 3. ใช้ Helper Function getRequestsCollection() เพื่อลบข้อมูลตามโครงสร้าง Firebase
        await getRequestsCollection().doc(docId).delete();
        console.log("ลบรายการสำเร็จ");
        // ระบบจะอัปเดต UI อัตโนมัติผ่าน onSnapshot listener
    } catch (err) {
        console.error("Delete Error:", err);
        alert('ไม่สามารถลบข้อมูลได้: ' + err.message);
    }
    </script>
</body>
</html>
