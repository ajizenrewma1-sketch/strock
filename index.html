<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการสต็อก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-pink-50 font-sans text-slate-800 selection:bg-pink-200">

    <!-- Login Section -->
    <div id="login-section" class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
        <div class="absolute bottom-10 right-10 text-pink-200 opacity-40 text-9xl transform rotate-12"><i class="fas fa-heart"></i></div>
        
        <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl shadow-pink-200/50 p-10 border-4 border-pink-100 relative z-10">
            <div class="text-center mb-10">
                <div class="bg-slate-900 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-slate-300 transform rotate-3">
                    <i class="fas fa-boxes text-pink-500 text-4xl transform -rotate-3"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-wider">ระบบจัดการ<span class="text-pink-500">สต็อก</span></h1>
                <p class="text-slate-500 font-medium mt-2 text-sm">เข้าสู่ระบบเพื่อดำเนินการ</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="username" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all font-bold text-slate-700" required placeholder="requester หรือ approver">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all font-bold text-slate-700" required placeholder="123 หรือ 456">
                </div>
                <button type="submit" id="login-btn" class="w-full mt-4 bg-pink-500 text-white py-4 rounded-xl font-black text-lg shadow-lg shadow-pink-200 hover:bg-pink-600 transition-all transform active:scale-95 flex justify-center items-center gap-2">
                    เข้าสู่ระบบ <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="mt-8 p-4 bg-slate-50 rounded-xl text-[11px] text-slate-400 text-center font-medium border border-slate-100">
                User: <b class="text-slate-700">requester</b> (123) | <b class="text-slate-700">approver</b> (456)
            </div>
        </div>
    </div>

    <!-- App Section -->
    <div id="app-section" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-slate-900 flex flex-col shadow-2xl z-20 relative overflow-hidden">
            <div class="p-6 border-b border-slate-800 relative z-10">
                <div class="flex items-center gap-3 text-white font-black text-xl mb-5 tracking-wider">
                    <i class="fas fa-boxes text-pink-500"></i> ระบบจัดการสต็อก
                </div>
                <div id="user-info" class="text-xs bg-slate-800 p-3 rounded-xl text-pink-300 font-bold truncate tracking-wide border border-slate-700 text-center shadow-inner"></div>
            </div>
            <nav class="flex-1 p-4 space-y-2 relative z-10" id="nav-menu"></nav>
            <div class="p-4 border-t border-slate-800 relative z-10">
                <button onclick="handleLogout()" class="w-full text-left flex items-center justify-center gap-3 px-4 py-3 text-pink-400 hover:bg-slate-800 hover:text-pink-300 font-bold rounded-xl transition-all">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </button>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-8 overflow-y-auto relative">
            <div id="content-area" class="max-w-6xl mx-auto"></div>
        </main>
    </div>

    <script>
// --- CUSTOM POPUPS ---
function KuromiAlert(msg) {
    return new Promise(resolve => {
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm";
        modal.innerHTML = `
            <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl transform transition-all border-4 border-slate-800 relative overflow-hidden text-center">
                <div class="w-16 h-16 bg-pink-100 text-pink-500 rounded-2xl flex items-center justify-center mx-auto mb-5 text-3xl transform rotate-3">
                    <i class="fas fa-bell transform -rotate-3"></i>
                </div>
                <h3 class="text-xl font-black text-slate-800 mb-3">แจ้งเตือน</h3>
                <p class="text-sm font-medium text-slate-600 mb-8 whitespace-pre-line leading-relaxed">${msg}</p>
                <button id="k-alert-ok" class="w-full px-4 py-4 rounded-xl font-black text-white bg-slate-800 hover:bg-slate-900 shadow-lg shadow-slate-300 transition-all">ตกลง</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('k-alert-ok').onclick = () => { document.body.removeChild(modal); resolve(); };
    });
}

function KuromiConfirm(msg) {
    return new Promise(resolve => {
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm";
        modal.innerHTML = `
            <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl transform transition-all border-4 border-pink-100 relative overflow-hidden text-center">
                <div class="w-16 h-16 bg-slate-100 text-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-5 text-3xl transform -rotate-3">
                    <i class="fas fa-question transform rotate-3"></i>
                </div>
                <h3 class="text-xl font-black text-slate-800 mb-3">ยืนยันการดำเนินการ</h3>
                <p class="text-sm font-medium text-slate-600 mb-8 whitespace-pre-line leading-relaxed text-left">${msg}</p>
                <div class="flex gap-3">
                    <button id="k-conf-cancel" class="flex-1 px-4 py-4 rounded-xl font-black text-slate-500 bg-slate-100 hover:bg-slate-200 transition-all">ยกเลิก</button>
                    <button id="k-conf-ok" class="flex-1 px-4 py-4 rounded-xl font-black text-white bg-pink-500 hover:bg-pink-600 shadow-lg shadow-pink-200 transition-all">ยืนยัน</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('k-conf-cancel').onclick = () => { document.body.removeChild(modal); resolve(false); };
        document.getElementById('k-conf-ok').onclick = () => { document.body.removeChild(modal); resolve(true); };
    });
}

// --- CONFIGURATION ---
const appId = 'inventory-html-001'; 

const firebaseConfig = {
  apiKey: "AIzaSyC_j4rtlWnUn8Tl7WUSoozLJvsqh-RKCeQ",
  authDomain: "mystocksystem-96108.firebaseapp.com",
  projectId: "mystocksystem-96108",
  storageBucket: "mystocksystem-96108.firebasestorage.app",
  messagingSenderId: "346699990806",
  appId: "1:346699990806:web:4f43cb52dfdfaa13c57237",
  measurementId: "G-KCNWYY7SYH"
};
        
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const getStockCollection = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('stock');
const getRequestsCollection = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('requests');
const getAddLogsCollection = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('add_logs');

const MOCK_USERS = [
    { username: 'requester', password: '123', role: 'requester', name: 'พนักงานเบิกสินค้า' },
    { username: 'approver', password: '456', role: 'approver', name: 'หัวหน้า/ผู้อนุมัติ' }
];

let currentUser = null;
let stockData = [];
let requestsData = [];
let addLogsData = [];
let currentTab = '';
let summarySelectedDate = new Date().toISOString().split('T')[0];
let unsubStock = null;
let unsubRequests = null;
let unsubAddLogs = null;

// --- AUTH LOGIC ---
const loginForm = document.getElementById('login-form');
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const loginBtn = document.getElementById('login-btn');
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบ...';

    const userMatch = MOCK_USERS.find(u => u.username === document.getElementById('username').value && u.password === document.getElementById('password').value);
    
    if (userMatch) {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }

            currentUser = userMatch;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-info').innerText = `สิทธิ์ใช้งาน: ${currentUser.name}`;
            
            setupNav();
            loadInitialTab();
            startListeners();
        } catch (error) {
            console.error("Auth Error:", error);
            await KuromiAlert('ไม่สามารถเชื่อมต่อฐานข้อมูลได้: ' + error.message);
        }
    } else {
        await KuromiAlert('Username หรือ Password ไม่ถูกต้อง!');
    }
    loginBtn.disabled = false;
    loginBtn.innerHTML = 'เข้าสู่ระบบ <i class="fas fa-arrow-right"></i>';
});

function handleLogout() {
    if (unsubStock) unsubStock();
    if (unsubRequests) unsubRequests();
    if (unsubAddLogs) unsubAddLogs();
    auth.signOut();
    location.reload();
}

function setupNav() {
    const nav = document.getElementById('nav-menu');
    
    // ปรับสีเมนูที่เลือก: ใช้ bg-pink-500/20 (ชมพูจางๆ) และเพิ่ม border เพื่อให้ดูนุ่มนวล
    const getActive = (tab) => {
        return currentTab === tab 
            ? 'bg-pink-500/20 text-pink-300 border border-pink-500/50 shadow-none' 
            : 'text-slate-400 hover:bg-slate-800 hover:text-pink-400';
    };

    // คำนวณการใช้งาน Cloud โดยตรงในนี้เพื่อให้แสดงผลอยู่เสมอ
    const usage = ((requestsData.length + stockData.length) / 10000).toFixed(4);

    let menu = `
        <button onclick="showTab('request')" class="nav-btn w-full text-left flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-bold transition-all ${getActive('request')}">
            <i class="fas fa-plus-circle text-lg"></i> แจ้งเบิกสินค้า
        </button>
        <button onclick="showTab('status')" class="nav-btn w-full text-left flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-bold transition-all ${getActive('status')}">
            <i class="fas fa-list-ul text-lg"></i> รายงานสถานะ
        </button>
    `;

    if (currentUser.role === 'approver') {
        menu += `
            <div class="pt-6 pb-2 px-5 text-[10px] uppercase font-black text-slate-600 tracking-widest">ส่วนการจัดการ</div>
            <button onclick="showTab('approve')" class="nav-btn w-full text-left flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-bold transition-all ${getActive('approve')}">
                <i class="fas fa-check-double text-lg"></i> อนุมัติเบิกสินค้า
            </button>
            <button onclick="showTab('stock')" class="nav-btn w-full text-left flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-bold transition-all ${getActive('stock')}">
                <i class="fas fa-warehouse text-lg"></i> สินค้าคงเหลือ
            </button>
            <button onclick="showTab('summary')" class="nav-btn w-full text-left flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-bold transition-all ${getActive('summary')}">
                <i class="fas fa-chart-pie text-lg"></i> สรุปผล
            </button>
        `;
    }

    // รวมกล่องแสดง Cloud Usage เข้าไปใน nav เลย
    menu += `
        <div class="px-4 pb-6 mt-auto">
            <div class="mt-6 p-4 bg-slate-950 rounded-xl border border-slate-800">
                <p class="text-[10px] text-pink-500 font-black uppercase">DATABASE USAGE: ${usage}%</p>
            </div>
        </div>
    `;

    nav.innerHTML = menu;
}

// แก้ไข: รวมฟังก์ชัน showTab ให้เหลือจุดเดียวเพื่อจัดการเมนูและเนื้อหา
function showTab(tabName) {
    currentTab = tabName; // เปลี่ยนค่าตัวแปรหน้าปัจจุบัน
    setupNav();           // วาดเมนูใหม่เพื่อให้สี Active เปลี่ยนไปตามหน้า
    renderTab();          // แสดงเนื้อหาของหน้านั้นๆ
}

function loadInitialTab() {
    showTab(currentUser.role === 'approver' ? 'approve' : 'request');
}

function startListeners() {
    if (!auth.currentUser) return;

    unsubStock = getStockCollection().onSnapshot(snap => {
        stockData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        if (currentTab === 'stock' || currentTab === 'request') renderTab();
        updateCloudUsage(); 
    }, err => console.error("Stock Sync Error:", err));

    unsubRequests = getRequestsCollection().onSnapshot(snap => {
        requestsData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
            .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        if (currentTab === 'status' || currentTab === 'approve' || currentTab === 'summary') renderTab();
        updateCloudUsage(); 
    }, err => console.error("Requests Sync Error:", err));

    unsubAddLogs = getAddLogsCollection().onSnapshot(snap => {
        addLogsData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}))
            .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        if (currentTab === 'summary') renderTab();
    }, err => console.error("AddLogs Sync Error:", err));
}

// --- RENDER LOGIC ---
function renderTab() {
    const container = document.getElementById('content-area');
    if (!container) return;
    
    if (currentTab === 'request') {
        container.innerHTML = `
            <div class="bg-white p-8 rounded-[2rem] shadow-xl shadow-pink-100/50 border-4 border-pink-50 max-w-2xl mx-auto relative overflow-hidden">
                <div class="absolute -top-6 -right-6 text-pink-50 opacity-50 transform rotate-12 text-9xl pointer-events-none"><i class="fas fa-heart"></i></div>
                <h3 class="text-2xl font-black mb-8 text-slate-800 flex items-center gap-3 relative z-10">
                    <i class="fas fa-plus-circle text-pink-500"></i> กรอกข้อมูลเบิกสินค้า
                </h3>
                <form onsubmit="handleRequestSubmit(event)" class="space-y-5 relative z-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">วันที่</label>
                            <input type="date" id="req-date" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all text-slate-700 font-bold" value="${new Date().toISOString().split('T')[0]}" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">เลือกสินค้า</label>
                            <select id="req-product" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all text-slate-700 font-bold" required>
    <option value="">-- เลือกสินค้า --</option>
    ${stockData.map(s => `
        <option value="${s.productName}" ${s.currentStock <= 0 ? 'disabled' : ''}>
            ${s.productName} (คงเหลือ: ${s.currentStock}, ราคา: ${s.price || 0} บาท)
        </option>
    `).join('')}
</select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">จำนวน</label>
                            <input type="number" id="req-qty" min="1" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all text-slate-700 font-bold" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ชื่อผู้เบิก</label>
                            <input type="text" id="req-name" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all text-slate-700 font-bold" placeholder="กรอกชื่อผู้เบิก" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ชื่อไรเดอร์</label>
                            <input type="text" id="req-rider" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all text-slate-700 font-bold" placeholder="กรอกชื่อไรเดอร์" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">รหัสร้าน</label>
                            <input type="text" id="req-store" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all text-slate-700 font-bold" required placeholder="เช่น 2863">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ชื่อสาขา</label>
                            <input type="text" id="req-branch" class="w-full px-5 py-3 border-2 border-slate-100 rounded-xl focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none transition-all text-slate-700 font-bold" required placeholder="เช่น เพชรเกษม 51">
                        </div>
                    </div>
                    <button type="submit" class="w-full mt-6 bg-pink-500 text-white py-4 rounded-xl font-black text-lg shadow-xl shadow-pink-200 hover:bg-pink-600 transition-all transform active:scale-95 flex justify-center items-center gap-2">
                        <i class="fas fa-paper-plane text-pink-200"></i> ยืนยันการเบิก
                    </button>
                </form>
            </div>
        `;
     } else if (currentTab === 'status') {
    container.innerHTML = `
        <div class="bg-white p-5 rounded-[2rem] shadow-lg shadow-pink-100/50 border-4 border-pink-50 mb-6 grid grid-cols-2 md:grid-cols-4 gap-4">
            <input type="text" id="filter-branch" placeholder="🔍 ค้นหาสาขา..." class="px-4 py-3 border-2 border-slate-100 rounded-xl text-sm outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-100 font-bold text-slate-700 transition-all" oninput="filterStatusTable()">
            <input type="text" id="filter-req" placeholder="🔍 ค้นหาผู้เบิก..." class="px-4 py-3 border-2 border-slate-100 rounded-xl text-sm outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-100 font-bold text-slate-700 transition-all" oninput="filterStatusTable()">
            <input type="text" id="filter-rider" placeholder="🔍 ค้นหาไรเดอร์..." class="px-4 py-3 border-2 border-slate-100 rounded-xl text-sm outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-100 font-bold text-slate-700 transition-all" oninput="filterStatusTable()">
            <select id="filter-status" class="px-4 py-3 border-2 border-slate-100 rounded-xl text-sm outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-100 font-bold text-slate-700 transition-all" onchange="filterStatusTable()">
                <option value="">-- ทุกสถานะ --</option>
                <option value="pending">รออนุมัติ</option>
                <option value="approved">อนุมัติแล้ว</option>
                <option value="rejected">ปฏิเสธ</option>
            </select>
        </div>

        <div class="bg-white rounded-[2rem] shadow-lg shadow-pink-100/50 border-4 border-pink-50 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-pink-50 text-xs uppercase tracking-widest font-black">
                    <tr>
                        <th class="px-6 py-5">วันที่</th>
                        <th class="px-6 py-5">สินค้า</th>
                        <th class="px-6 py-5 text-center">จำนวน</th>
                        <th class="px-6 py-5">ผู้เบิก</th>
                        <th class="px-6 py-5">ไรเดอร์</th>
                        <th class="px-6 py-5">รหัสร้าน/สาขา</th>
                        <th class="px-6 py-5 text-center">สถานะ</th>
                        ${currentUser.role === 'approver' ? '<th class="px-6 py-5 text-center">จัดการ</th>' : ''}
                    </tr>
                </thead>
                <tbody id="status-tbody" class="divide-y divide-pink-50">
                    ${requestsData.map(r => {
                        const isApprover = currentUser.role === 'approver';
                        const qtyDisplay = isApprover 
                            ? `<input type="number" value="${r.quantity}" onchange="updateRequestField('${r.id}', 'quantity', this.value)" class="w-16 border-2 border-slate-200 rounded-lg px-2 py-1 text-center font-bold text-pink-600 outline-none focus:border-pink-400">`
                            : `<span class="font-bold text-pink-600 text-lg">${r.quantity}</span>`;

                        const statusDisplay = isApprover
                            ? `<select onchange="approveRequest('${r.id}', this.value)" class="text-xs font-bold rounded-full px-3 py-1 outline-none cursor-pointer ${getStatusClass(r.status)}">
                                <option value="pending" ${r.status === 'pending' ? 'selected' : ''}>รออนุมัติ</option>
                                <option value="approved" ${r.status === 'approved' ? 'selected' : ''}>อนุมัติแล้ว</option>

// ฟังก์ชันลบรายการเคลื่อนไหวในหน้าสรุปผล
async function deleteMovementRecord(id, type) {
    if (currentUser.role !== 'approver') return;
    if (!(await KuromiConfirm("คุณแน่ใจหรือไม่ว่าต้องการลบประวัตินี้?\n(หมายเหตุ: การลบเฉพาะประวัติจะไม่ส่งผลกระทบต่อยอดสินค้าคงเหลือปัจจุบัน)"))) return;

    try {
        if (type === 'out') {
            await getRequestsCollection().doc(id).delete();
        } else {
            await getAddLogsCollection().doc(id).delete();
        }
        await KuromiAlert("ลบประวัติรายการเรียบร้อยแล้ว");
    } catch (err) {
        await KuromiAlert("เกิดข้อผิดพลาดในการลบ: " + err.message);
    }
}

function updateSummarySelectedDate(newDate) {
    summarySelectedDate = newDate;
    renderTab();
}

function getLast7DaysStat(type) {
    const dates = [];
    for(let i=0; i<7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(d.toISOString().split('T')[0]);
    }
    const data = type === 'withdraw' ? requestsData.filter(r => r.status === 'approved') : addLogsData;
    return dates.map(date => {
        const recordsForDate = data.filter(r => r.date === date);
        const dailySum = recordsForDate.reduce((sum, item) => sum + item.quantity, 0);
        const detailsMap = {};
        recordsForDate.forEach(r => { detailsMap[r.productName] = (detailsMap[r.productName] || 0) + r.quantity; });
        const detailStr = Object.entries(detailsMap).map(([name, qty]) => `${name} (x${qty})`).join(', ');
        return `
            <div class="py-2 border-b border-slate-50 last:border-0">
                <div class="flex items-center justify-between text-sm mb-1">
                    <span class="font-bold text-slate-400">${date === new Date().toISOString().split('T')[0] ? 'วันนี้' : date}</span>
                    <div class="flex-1 mx-4 bg-slate-50 h-2 rounded-full overflow-hidden">
                        <div class="${type === 'withdraw' ? 'bg-pink-400' : 'bg-slate-400'} h-full" style="width: ${Math.min(dailySum, 100)}%"></div>
                    </div>
                    <span class="font-black text-slate-700 w-10 text-right">${dailySum}</span>
                </div>
                ${detailStr ? `<p class="text-[10px] text-slate-400 font-medium pl-1 flex items-start gap-1"><i class="fas fa-tag opacity-40 mt-0.5"></i> <span>${detailStr}</span></p>` : ''}
            </div>
        `;
    }).join('');
}

    if (!month) return;
    const allLogs = [
        ...requestsData.filter(r => r.status === 'approved' && r.date.startsWith(month)).map(r => ({ id: r.id, ...r, logType: 'out', sortDate: r.date })),
        ...addLogsData.filter(l => l.date.startsWith(month)).map(l => ({ id: l.id, ...l, logType: 'in', sortDate: l.date }))
    ].sort((a,b) => b.sortDate.localeCompare(a.sortDate));
    container.innerHTML = `<table class="w-full text-left border-collapse">
        <thead class="bg-slate-800 text-pink-50 text-xs uppercase font-black sticky top-0 tracking-widest z-10 shadow-lg">
            <tr><th class="p-6">วันที่</th><th class="p-6">ประเภท</th><th class="p-6">สินค้า</th><th class="p-6 text-center">จำนวน</th><th class="p-6">ผู้รับผิดชอบ</th><th class="p-6">รายละเอียด</th><th class="p-6 text-center">จัดการ</th></tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
            ${allLogs.map(l => `
                <tr class="hover:bg-slate-50">
                    <td class="p-6 text-sm font-bold text-slate-400">${l.date}</td>
                    <td class="p-6"><span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase ${l.logType === 'in' ? 'bg-green-100 text-green-600' : 'bg-rose-100 text-rose-600'}">${l.logType === 'in' ? 'เพิ่มสินค้า' : 'เบิกสินค้า'}</span></td>
                    <td class="p-6 text-sm font-black text-slate-800">${l.productName}</td>
                    <td class="p-6 text-sm font-black text-center ${l.logType === 'in' ? 'text-green-600' : 'text-rose-600'}">${l.logType === 'in' ? '+' : '-'}${l.quantity}</td>
                    <td class="p-6 text-sm font-bold text-slate-600">${l.logType === 'in' ? (l.addedBy || 'ไม่ระบุ') : l.requesterName}</td>
                    <td class="p-6 text-xs font-medium text-slate-400 italic">${l.logType === 'in' ? 'สต็อกหลัก' : `ร้าน: ${l.storeId}`}</td>
                    <td class="p-6 text-center">
                        <button onclick="deleteMovementRecord('${l.id}', '${l.logType === 'in' ? 'in' : 'out'}')" class="w-8 h-8 rounded-full text-slate-300 hover:text-white hover:bg-rose-500 transition-all inline-flex items-center justify-center">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </td>
                </tr>
            `).join('')}
        </tbody>
    </table>`;
};

// --- ACTION HANDLERS ---
async function handleAddNewProduct(e) {
    e.preventDefault();
    if (!auth.currentUser || currentUser.role !== 'approver') return;

    let name = document.getElementById('new-prod-name').value;
    if (name === 'อื่นๆ') name = document.getElementById('new-prod-custom').value;
    const stockToAdd = parseInt(document.getElementById('new-prod-stock').value);
    const min = parseInt(document.getElementById('new-prod-min').value);
    const price = parseFloat(document.getElementById('new-prod-price').value) || 0; // เพิ่มรับค่าราคา
    const addedBy = document.getElementById('new-prod-added-by').value || 'ไม่ระบุ';

    if (!(await KuromiConfirm(`ยืนยันการเพิ่มสินค้าเข้าระบบ?\n\nรายการ: ${name}\nจำนวน: ${stockToAdd}\nราคาต่อหน่วย: ${price} บาท\nผู้เพิ่ม: ${addedBy}`))) return;

    try {
        const existingProduct = stockData.find(s => s.productName === name);

        if (existingProduct) {
            await getStockCollection().doc(existingProduct.id).update({
                currentStock: firebase.firestore.FieldValue.increment(stockToAdd),
                price: price, // อัปเดตราคาสินค้า
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        } else {
            await getStockCollection().add({
                productName: name,
                currentStock: stockToAdd,
                minStock: min,
                price: price, // บันทึกราคา
                withdrawalCount: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        await getAddLogsCollection().add({
            date: new Date().toISOString().split('T')[0],
            productName: name,
            quantity: stockToAdd,
            addedBy: addedBy,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        e.target.reset();
        document.getElementById('new-prod-custom').classList.add('hidden');
        await KuromiAlert('ดำเนินการเรียบร้อยแล้ว');
    } catch (err) { await KuromiAlert('เกิดข้อผิดพลาด: ' + err.message); }
}

async function handleRequestSubmit(e) {
    e.preventDefault();
    const productName = document.getElementById('req-product').value;
    const quantity = parseInt(document.getElementById('req-qty').value);
    const requesterName = document.getElementById('req-name').value; 
    const date = document.getElementById('req-date').value;
    const product = stockData.find(s => s.productName === productName);

    if (!product || product.currentStock < quantity) return await KuromiAlert(`สินค้าไม่เพียงพอ! เหลือเพียง ${product ? product.currentStock : 0} ชิ้น`);
    if (!(await KuromiConfirm(`ยืนยันการแจ้งเบิก?\n\nรายการ: ${productName}\nจำนวน: ${quantity}`))) return;

    try {
        await getRequestsCollection().add({
            date, productName, quantity, requesterName, 
            riderName: document.getElementById('req-rider').value,
            storeId: document.getElementById('req-store').value,
            branchName: document.getElementById('req-branch').value, 
            status: 'pending',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await KuromiAlert('ส่งคำขอเบิกแล้ว');
        showTab('status');
    } catch (err) { await KuromiAlert('ไม่สำเร็จ: ' + err.message); }
}

// อัปเดตตรรกะการอนุมัติให้รองรับทุกการเปลี่ยนสถานะแบบสมบูรณ์และป้องกัน Race Condition
async function approveRequest(reqId, newStatus) {
    const reqRef = getRequestsCollection().doc(reqId);
    const snap = await reqRef.get();
    const data = snap.data();
    const stockItem = stockData.find(s => s.productName === data.productName);

    if (newStatus === data.status) return;

    if (newStatus === 'approved' && (!stockItem || stockItem.currentStock < data.quantity)) {
        await KuromiAlert('สต็อกไม่เพียงพออนุมัติ');
        renderTab();
        return;
    }
    if (!(await KuromiConfirm(`ยืนยันการดำเนินการเปลี่ยนสถานะเป็น "${getStatusLabel(newStatus)}"?`))) { 
        renderTab(); 
        return; 
    }

    try {
        if (stockItem) {
            const stockRef = getStockCollection().doc(stockItem.id);
            // ถ้าอนุมัติ (หักสต็อก)
            if (newStatus === 'approved' && data.status !== 'approved') {
                await stockRef.update({ 
                    currentStock: firebase.firestore.FieldValue.increment(-data.quantity), 
                    withdrawalCount: firebase.firestore.FieldValue.increment(data.quantity) 
                });
            } 
            // ถ้ายกเลิกการอนุมัติ (คืนสต็อก)
            else if (data.status === 'approved' && newStatus !== 'approved') {
                await stockRef.update({ 
                    currentStock: firebase.firestore.FieldValue.increment(data.quantity), 
                    withdrawalCount: firebase.firestore.FieldValue.increment(-data.quantity) 
                });
            }
        }
        await reqRef.update({ status: newStatus, respondedAt: firebase.firestore.FieldValue.serverTimestamp() });
        await KuromiAlert('ดำเนินการแล้ว');
    } catch (err) { 
        await KuromiAlert('ไม่สำเร็จ: ' + err.message); 
        renderTab();
    }
}

async function updateRequestField(reqId, field, value) {
    const reqRef = getRequestsCollection().doc(reqId);
    const snap = await reqRef.get();
    const oldData = snap.data();
    const newValue = field === 'quantity' ? parseInt(value) : value;
    const stockItem = stockData.find(s => s.productName === oldData.productName);

    if (field === 'quantity' && oldData.status === 'approved' && stockItem.currentStock < (newValue - oldData.quantity)) {
        await KuromiAlert('สต็อกไม่พอแก้เลข');
        renderTab();
        return;
    }
    if (!(await KuromiConfirm(`ยืนยันการแก้ไขข้อมูล?`))) { renderTab(); return; }

    try {
        if (stockItem && field === 'quantity' && oldData.status === 'approved') {
            const diff = newValue - oldData.quantity;
            await getStockCollection().doc(stockItem.id).update({ 
                currentStock: firebase.firestore.FieldValue.increment(-diff), 
                withdrawalCount: firebase.firestore.FieldValue.increment(diff) 
            });
        }
        await reqRef.update({ [field]: newValue, updatedBy: currentUser.name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        await KuromiAlert('บันทึกแล้ว');
    } catch (err) { 
        await KuromiAlert('เกิดปัญหา: ' + err.message); 
        renderTab();
    }
}

function toggleCustomProductInput() {
    const select = document.getElementById('new-prod-name');
    const customInput = document.getElementById('new-prod-custom');
    if (select.value === 'อื่นๆ') { customInput.classList.remove('hidden'); customInput.required = true; } 
    else { customInput.classList.add('hidden'); customInput.required = false; }
}

async function handleEditStock(docId, name, currentQty, currentMin, currentPrice) {
    const q = prompt("ระบุจำนวนใหม่:", currentQty);
    const m = prompt("ระบุจุดสั่งซื้อใหม่:", currentMin);
    const p = prompt("ระบุราคาต่อหน่วยใหม่:", currentPrice || 0); // เพิ่มการรับค่าราคา
    
    if (q === null || m === null || p === null) return;
    
    try {
        await getStockCollection().doc(docId).update({ 
            currentStock: parseInt(q), 
            minStock: parseInt(m), 
            price: parseFloat(p), // อัปเดตราคาสินค้าลงฐานข้อมูล
            updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
        });
        await KuromiAlert("อัปเดตเรียบร้อย");
    } catch(e) { await KuromiAlert(e.message); }
}

async function handleDeleteProduct(docId, name) {
    if (await KuromiConfirm(`ลบ ${name} หรือไม่?\n\nคำเตือน: ประวัติการเบิกและการเคลื่อนไหวทั้งหมดของสินค้าชิ้นนี้จะถูกลบออกด้วย`)) {
        try {
            const batch = db.batch();
            
            batch.delete(getStockCollection().doc(docId));

            const requestsQuery = await getRequestsCollection().where('productName', '==', name).get();
            requestsQuery.forEach(doc => {
                batch.delete(doc.ref);
            });

            const additionsQuery = await getAddLogsCollection().where('productName', '==', name).get();
            additionsQuery.forEach(doc => {
                batch.delete(doc.ref);
            });

            await batch.commit();
            await KuromiAlert("ลบสินค้าและประวัติการเคลื่อนไหวที่เกี่ยวข้องเรียบร้อยแล้ว\n(สถานะ: ลบรายการจากหน้าสินค้าคงเหลือ)");
        } catch (err) {
            await KuromiAlert("เกิดข้อผิดพลาดในการลบข้อมูล: " + err.message);
        }
    }
}

function filterStatusTable() {
    const branch = document.getElementById('filter-branch').value.toLowerCase();
    const req = document.getElementById('filter-req').value.toLowerCase();
    const rider = document.getElementById('filter-rider').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    document.querySelectorAll('.status-row').forEach(row => {
        const match = row.dataset.branch.includes(branch) && row.dataset.req.includes(req) && row.dataset.rider.includes(rider) && (status === "" || row.dataset.status === status);
        row.style.display = match ? '' : 'none';
    });
}

function getStatusClass(status) { return status === 'approved' ? 'bg-pink-500 text-white border-none' : status === 'rejected' ? 'bg-slate-800 text-white border-none' : 'bg-white text-slate-600 border-2 border-slate-200'; }
function getStatusLabel(status) { return status === 'approved' ? 'อนุมัติแล้ว' : status === 'rejected' ? 'ปฏิเสธ' : 'รออนุมัติ'; }

async function deleteRequestRecord(docId) { if (await KuromiConfirm("ลบประวัตินี้?")) await getRequestsCollection().doc(docId).delete(); }
